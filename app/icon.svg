<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0e101a"/>
  <g transform="translate(16,16)">
    <!-- body -->
    <ellipse cx="0" cy="2" rx="6" ry="8" fill="#ef4444"/>
    <ellipse cx="0" cy="-1" rx="3" ry="4" fill="rgba(255,255,255,0.15)"/>
    <!-- eyes -->
    <circle cx="-2" cy="-1" r="1.2" fill="#06b6d4"/>
    <circle cx="2" cy="-1" r="1.2" fill="#06b6d4"/>
    <circle cx="-1.7" cy="-1.3" r="0.4" fill="#fff"/>
    <circle cx="2.3" cy="-1.3" r="0.4" fill="#fff"/>
    <!-- left claw -->
    <g transform="translate(-7,-2) rotate(-30)">
      <ellipse cx="0" cy="-1.5" rx="4" ry="1.5" fill="#ef4444"/>
      <ellipse cx="0" cy="1" rx="3.5" ry="1.3" fill="#ef4444"/>
    </g>
    <!-- right claw -->
    <g transform="translate(7,-2) rotate(30)">
      <ellipse cx="0" cy="-1.5" rx="4" ry="1.5" fill="#ef4444"/>
      <ellipse cx="0" cy="1" rx="3.5" ry="1.3" fill="#ef4444"/>
    </g>
    <!-- antennae -->
    <line x1="-2" y1="-8" x2="-4" y2="-13" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="-8" x2="4" y2="-13" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-4" cy="-13" r="1.5" fill="#06b6d4"/>
    <circle cx="4" cy="-13" r="1.5" fill="#06b6d4"/>
  </g>
</svg>
